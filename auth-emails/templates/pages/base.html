<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Auth Demo{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; color: #111827; min-height: 100vh; }
    nav { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    nav a { text-decoration: none; color: #2563eb; font-weight: 600; font-size: 15px; }
    nav .nav-right { display: flex; gap: 16px; align-items: center; }
    nav .nav-right a, nav .nav-right button { font-size: 14px; color: #6b7280; background: none; border: none; cursor: pointer; padding: 0; }
    nav .nav-right a:hover, nav .nav-right button:hover { color: #111827; }
    .container { max-width: 440px; margin: 56px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 36px 32px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input[type=text], input[type=email], input[type=password] {
      width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px;
      font-size: 14px; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    input.is-invalid { border-color: #ef4444; }
    input.is-invalid:focus { box-shadow: 0 0 0 3px rgba(239,68,68,.1); }
    .field-error { display: block; font-size: 12px; color: #b91c1c; margin-top: 5px; }
    .btn { display: block; width: 100%; padding: 11px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; transition: background .15s; }
    .btn:hover { background: #1d4ed8; }
    .btn-secondary { background: #fff; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:hover { background: #f9fafb; }
    .alert { padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
    .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .alert-info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .text-link { color: #2563eb; font-size: 13px; text-decoration: none; }
    .text-link:hover { text-decoration: underline; }
    .footer-links { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
    .footer-links a { color: #2563eb; text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Auth Demo</a>
    <div class="nav-right">
      {% block nav_right %}{% endblock %}
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
