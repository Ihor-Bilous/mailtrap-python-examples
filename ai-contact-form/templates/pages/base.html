<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Contact Us{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; color: #111827; min-height: 100vh; }
    nav { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 24px; height: 56px; display: flex; align-items: center; }
    nav a { text-decoration: none; color: #2563eb; font-weight: 600; font-size: 15px; }
    .container { max-width: 560px; margin: 56px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 36px 32px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input[type=text], input[type=email], textarea {
      width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px;
      font-size: 14px; outline: none; transition: border-color .15s; font-family: inherit;
    }
    input:focus, textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    input.is-invalid, textarea.is-invalid { border-color: #ef4444; }
    input.is-invalid:focus, textarea.is-invalid:focus { box-shadow: 0 0 0 3px rgba(239,68,68,.1); }
    textarea { resize: vertical; min-height: 120px; }
    .field-error { display: block; font-size: 12px; color: #b91c1c; margin-top: 5px; }
    .btn { display: block; width: 100%; padding: 11px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; transition: background .15s; }
    .btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <nav>
    <a href="/contact">Contact Form Demo</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
