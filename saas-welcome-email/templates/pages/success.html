{% extends "pages/base.html" %}

{% block title %}Welcome aboard!{% endblock %}

{% block content %}
<div class="card" style="text-align: center; padding: 48px 32px;">
  <div style="font-size: 48px; margin-bottom: 20px;">🎉</div>
  <h1 style="margin-bottom: 12px;">You're in!</h1>
  <p style="color: #6b7280; font-size: 15px; line-height: 1.6; margin-bottom: 28px;">
    We've sent a personalised welcome email to your inbox. Check it out to get started.
  </p>
  <a href="/signup" style="display: inline-block; padding: 10px 24px; background: #2563eb; color: #fff; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600;">
    Sign up again
  </a>
</div>
{% endblock %}
